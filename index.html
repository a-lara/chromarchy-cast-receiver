<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chromarchy Calibration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #idle {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; background: #08090F;
      font-family: -apple-system, sans-serif; color: rgba(242,240,237,0.55);
      font-size: 2.4vw; letter-spacing: 0.08em; text-transform: uppercase;
    }

    #aruco-canvas {
      display: none; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }

    #patch {
      display: none; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
  </style>
</head>
<body>
  <div id="idle">Chromarchy · Calibrating</div>
  <canvas id="aruco-canvas"></canvas>
  <div id="patch"></div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    'use strict';

    // ARUCO_MIP_36h12 codes for IDs 0..3 (must match js-aruco2 detector on the
    // hub-side mobile app — see mobile/lib/aruco.ts). 36 bits, big-endian,
    // row-major across a 6x6 inner grid. Bit=1 → white cell.
    const CODES_36H12 = [
      0xd2b63a09d, 0x6001134e5, 0x1206fbe72, 0xff8ad6cb4,
    ];
    const MARKER_BITS = 6;

    function codeToGrid(hexCode) {
      const bits = BigInt(hexCode).toString(2).padStart(MARKER_BITS * MARKER_BITS, '0');
      const grid = [];
      for (let y = 0; y < MARKER_BITS; y++) {
        const row = [];
        for (let x = 0; x < MARKER_BITS; x++) {
          row.push(bits[y * MARKER_BITS + x] === '1' ? 1 : 0);
        }
        grid.push(row);
      }
      return grid;
    }
    const MARKER_GRIDS = CODES_36H12.map(codeToGrid);

    // Marker size as a fraction of canvas WIDTH. 0.14 gives ~48px markers on
    // a 480x320 hub snapshot — comfortably above js-aruco2's per-cell pixel
    // threshold even with barrel distortion + JPEG compression on the
    // hub-side camera path.
    const MARKER_FRAC = 0.14;
    const EDGE_MARGIN_FRAC = 0.05; // distance from canvas edge, in W-fractions

    function drawMarker(ctx, id, cx, cy, size) {
      const grid = MARKER_GRIDS[id];
      // 6x6 inner + 1-cell black border on each side = 8x8 total
      const cellsTotal = MARKER_BITS + 2;
      const cell = size / cellsTotal;
      const ox = cx - size / 2;
      const oy = cy - size / 2;

      ctx.fillStyle = '#000';
      ctx.fillRect(ox, oy, size, size);

      ctx.fillStyle = '#fff';
      for (let r = 0; r < MARKER_BITS; r++) {
        for (let c = 0; c < MARKER_BITS; c++) {
          if (grid[r][c]) {
            ctx.fillRect(ox + (c + 1) * cell, oy + (r + 1) * cell, cell, cell);
          }
        }
      }
    }

    function showAruco() {
      const canvas = document.getElementById('aruco-canvas');
      const W = window.innerWidth;
      const H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      canvas.style.display = 'block';
      document.getElementById('idle').style.display = 'none';
      document.getElementById('patch').style.display = 'none';

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);

      const mSize = Math.round(W * MARKER_FRAC);
      const marginX = Math.round(W * EDGE_MARGIN_FRAC);
      const marginY = marginX; // same pixel margin top/bottom and left/right
      const positions = [
        { id: 0, x: marginX,                 y: marginY },
        { id: 1, x: W - marginX - mSize,     y: marginY },
        { id: 2, x: W - marginX - mSize,     y: H - marginY - mSize },
        { id: 3, x: marginX,                 y: H - marginY - mSize },
      ];

      for (const p of positions) {
        drawMarker(ctx, p.id, p.x + mSize / 2, p.y + mSize / 2, mSize);
      }
    }

    function showPatch(color) {
      document.getElementById('aruco-canvas').style.display = 'none';
      document.getElementById('idle').style.display = 'none';
      const patch = document.getElementById('patch');
      patch.style.display = 'block';
      patch.style.backgroundColor = color;
    }

    function showIdle() {
      document.getElementById('aruco-canvas').style.display = 'none';
      document.getElementById('patch').style.display = 'none';
      document.getElementById('idle').style.display = 'flex';
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const NAMESPACE = 'urn:x-cast:com.chromarchy.calibrate';

    context.addCustomMessageListener(NAMESPACE, (event) => {
      const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;

      switch (data.type) {
        case 'aruco':
          showAruco();
          break;
        case 'patch':
          showPatch(data.color || '#000');
          break;
        case 'blank':
          showIdle();
          break;
        default:
          console.warn('Unknown message type:', data.type);
      }
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get('test') === 'aruco') {
      showAruco();
    } else if (params.get('test') === 'patch') {
      showPatch(params.get('color') || '#FF0000');
    } else {
      const options = new cast.framework.CastReceiverOptions();
      options.disableIdleTimeout = true;
      options.customNamespaces = { [NAMESPACE]: cast.framework.system.MessageType.JSON };
      context.start(options);
    }
  </script>
</body>
</html>
